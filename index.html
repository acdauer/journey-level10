<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Journey Auto Repair — Level 10 Meeting</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<script src="https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js"></script>
<style>
:root{--o:#FE8630;--bg:#fff;--bg2:#f5f6f7;--bd:#e2e4e7;--t:#1a1d20;--t2:#6b7280;--gr:#3B6D11;--gr2:#EAF3DE;--re:#A32D2D;--re2:#FCEBEB;--am:#854F0B;--am2:#FAEEDA;--bl:#0C447C;--bl2:#E6F1FB;--r:8px;--rs:5px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1d20;--bg2:#23272b;--bd:#333a42;--t:#f0f1f2;--t2:#9ba3ad}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--t);min-height:100vh}
.wrap{max-width:1600px;margin:0 auto;padding:1.25rem 1.5rem 3rem}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-dot{width:38px;height:38px;border-radius:50%;background:var(--o);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-dot i{color:#fff;font-size:19px}
.app-title{font-size:18px;font-weight:700;color:var(--t)}
.app-sub{font-size:12px;color:var(--t2);margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wpill{font-size:12px;padding:5px 12px;border-radius:var(--rs);background:var(--o);color:#fff;font-weight:700}
.ibtn{font-size:12px;padding:5px 12px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--bg);color:var(--t);cursor:pointer;display:flex;align-items:center;gap:5px}
.ibtn:hover{background:var(--bg2)}
.ibtn.ob{border-color:var(--o);color:var(--o)}
.abar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--r);margin-bottom:1.25rem;font-size:12px;flex-wrap:wrap;gap:8px}
.abar.pend{background:var(--am2);color:var(--am);border:1px solid #f0d49a}
.abar.conn{background:var(--gr2);color:var(--gr);border:1px solid #b2d48a}
.abar.err{background:var(--re2);color:var(--re);border:1px solid #f0b8b8}
.abtn{font-size:12px;padding:5px 12px;border-radius:var(--rs);border:none;cursor:pointer;font-weight:700}
.abtn.si{background:var(--o);color:#fff}
.abtn.so{background:rgba(0,0,0,.12);color:inherit}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
@media(max-width:600px){.sgrid{grid-template-columns:repeat(2,1fr)}}
.scard{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px}
.slbl{font-size:11px;color:var(--t2);margin-bottom:3px}
.sval{font-size:22px;font-weight:700}
.ssub{font-size:11px;color:var(--t2);margin-top:2px}
.cg{color:var(--gr)}.ca{color:var(--am)}.cr{color:var(--re)}
.nav{display:flex;flex-wrap:wrap;border-bottom:1px solid var(--bd);margin-bottom:1.25rem;}
.ntab{font-size:12px;padding:8px 10px;cursor:pointer;color:var(--t2);border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:4px;flex:1;justify-content:center;min-width:0}
.ntab i{font-size:13px}
.ntab:hover{color:var(--t)}
.ntab.active{color:var(--o);border-bottom-color:var(--o);font-weight:700}
.card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:1rem}
.chdr{padding:11px 15px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.chl{display:flex;align-items:center;gap:8px}
.chl i{font-size:16px;color:var(--o)}
.ctitle{font-size:13px;font-weight:700;color:var(--t)}
.csub{font-size:11px;color:var(--t2);margin-top:1px}
.tbadge{font-size:11px;padding:3px 9px;border-radius:var(--rs);background:var(--o);color:#fff;font-weight:700;white-space:nowrap}
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 10px;text-align:left;color:var(--t2);font-weight:700;border-bottom:1px solid var(--bd);font-size:11px;white-space:nowrap;background:var(--bg2)}
td{padding:7px 10px;color:var(--t);border-bottom:1px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.ni{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rs);padding:3px 6px;font-size:12px;color:var(--t);text-align:center}
.ni:focus{outline:none;border-color:var(--o)}
.ie{background:transparent;border:none;font-size:12px;color:var(--t);width:100%;padding:2px 4px;border-radius:4px;cursor:pointer}
.ie:hover{background:var(--bg2);outline:1px dashed var(--bd)}
.ie:focus{background:var(--bg2);outline:1px solid var(--o);cursor:text}
.ien{background:transparent;border:none;font-size:12px;color:var(--t);width:100%;padding:2px 4px;border-radius:4px;cursor:pointer;text-align:center}
.ien:hover{background:var(--bg2);outline:1px dashed var(--bd)}
.ien:focus{background:var(--bg2);outline:1px solid var(--o)}
.tf{width:100%;font-size:13px;border:none;background:transparent;color:var(--t);padding:0}
.tf:focus{outline:none}
.bdg{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:10px}
.bg{background:var(--gr2);color:var(--gr)}.br{background:var(--re2);color:var(--re)}.ba{background:var(--am2);color:var(--am)}.bx{background:var(--bg2);color:var(--t2)}
.pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:var(--rs);font-weight:700}
.pon{background:var(--gr2);color:var(--gr)}.pof{background:var(--re2);color:var(--re)}.pri{background:var(--am2);color:var(--am)}
.ptag{font-size:10px;padding:1px 7px;border-radius:var(--rs);background:var(--bl2);color:var(--bl)}
.iph{font-size:10px;padding:2px 7px;border-radius:var(--rs);font-weight:700}
.iph.hi{background:var(--re2);color:var(--re)}.iph.me{background:var(--am2);color:var(--am)}.iph.lo{background:var(--gr2);color:var(--gr)}
.fn{font-size:10px;color:var(--t2);font-style:italic}
.arow{display:flex;align-items:center;gap:10px;padding:11px 15px;border-bottom:1px solid var(--bd)}
.arow:last-child{border-bottom:none}
.anum{width:24px;height:24px;border-radius:50%;background:var(--o);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cw{display:flex;align-items:flex-start;gap:10px;padding:10px 15px;border-bottom:1px solid var(--bd)}
.cw:last-child{border-bottom:none}
.hlrow{padding:10px 15px;border-bottom:1px solid var(--bd)}
.hlrow:last-child{border-bottom:none}
.hlp{font-size:11px;font-weight:700;color:var(--o);margin-bottom:4px}
.rbtn{background:none;border:none;cursor:pointer;color:var(--t2);padding:2px 4px;font-size:13px;border-radius:4px}
.rbtn:hover{color:var(--re);background:var(--re2)}
.addbtn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--o);padding:9px 15px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-weight:700;border-top:1px solid var(--bd)}
.addbtn:hover{background:var(--bg2)}
.addbtn i{font-size:14px}
.ehint{font-size:10px;color:var(--t2);padding:6px 15px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:5px;background:var(--bg2)}
.rtbtn{width:32px;height:32px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--bg2);color:var(--t);cursor:pointer;font-size:12px;font-weight:700}
.rtbtn:hover{border-color:var(--o);color:var(--o)}
.rtbtn.sel{background:var(--o);color:#fff;border-color:var(--o)}
.sctabs{display:flex;padding:0 15px;border-bottom:1px solid var(--bd);background:var(--bg2);overflow-x:auto}
.sctab{font-size:11px;padding:8px 12px;cursor:pointer;color:var(--t2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-weight:500}
.sctab:hover{color:var(--t)}
.sctab.active{color:var(--o);border-bottom-color:var(--o);font-weight:700}
select{font-size:12px;padding:3px 7px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--bg2);color:var(--t);cursor:pointer}
select:focus{outline:none;border-color:var(--o)}
.notice{padding:8px 15px;font-size:11px;display:flex;align-items:center;gap:6px;border-top:1px solid var(--bd)}
.notice.gn{background:var(--gr2);color:var(--gr)}.notice.am{background:var(--am2);color:var(--am)}
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
.moverlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--r);border:1px solid var(--bd);padding:1.5rem;width:380px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.mtitle{font-size:15px;font-weight:700;color:var(--t);margin-bottom:1.1rem}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.fld input,.fld select,.fld textarea{width:100%;font-size:13px;padding:7px 10px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--bg);color:var(--t)}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--o)}
.fld textarea{resize:vertical;min-height:64px}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.1rem}
.bcnl{font-size:13px;padding:7px 14px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--bg);color:var(--t);cursor:pointer}
.bsav{font-size:13px;padding:7px 14px;border-radius:var(--rs);border:none;background:var(--o);color:#fff;cursor:pointer;font-weight:700}
.soverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2000;align-items:flex-start;justify-content:flex-end}
.soverlay.open{display:flex}
.spanel{background:var(--bg);width:340px;max-width:95vw;height:100vh;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.15);display:flex;flex-direction:column}
.shdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--bd);background:var(--bg2)}
.stitle{font-size:15px;font-weight:700;color:var(--t)}
.sclose{background:none;border:none;cursor:pointer;color:var(--t2);font-size:20px;line-height:1}
.sclose:hover{color:var(--re)}
.sbody{padding:16px 18px;flex:1}
.ssec{margin-bottom:1.5rem}
.ssectitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--o);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.srow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.srow label{font-size:12px;color:var(--t2);width:110px;flex-shrink:0}
.srow input{flex:1;font-size:12px;padding:5px 8px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--bg);color:var(--t)}
.srow input:focus{outline:none;border-color:var(--o)}
.sfoot{padding:14px 18px;border-top:1px solid var(--bd);background:var(--bg2)}
.ssave{width:100%;font-size:13px;padding:8px;border-radius:var(--rs);border:none;background:var(--o);color:#fff;cursor:pointer;font-weight:700}
.sreset{width:100%;font-size:12px;padding:6px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--bg);color:var(--t2);cursor:pointer;margin-top:6px}
.sreset:hover{color:var(--re);border-color:var(--re)}
.spin{display:inline-block;width:11px;height:11px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

.app-layout{display:flex;gap:14px;align-items:flex-start;}
.agenda-sidebar{width:185px;flex-shrink:0;position:sticky;top:10px;}
.main-content{flex:1;min-width:0;}
.ag-card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;}
.ag-hdr{padding:9px 12px;background:var(--o);display:flex;align-items:center;gap:6px;}
.ag-hdr span{font-size:12px;font-weight:700;color:#fff;}
.ag-progress{height:4px;background:var(--bg2);}
.ag-bar{height:100%;background:var(--o);transition:width .4s;}
.ag-item{display:flex;align-items:flex-start;gap:7px;padding:8px 10px;border-bottom:1px solid var(--bd);cursor:pointer;border-left:3px solid transparent;transition:background .15s;}
.ag-item:last-child{border-bottom:none;}
.ag-item:hover{background:var(--bg2);}
.ag-item.active{background:rgba(254,134,48,.1);border-left-color:var(--o);}
.ag-num{width:17px;height:17px;border-radius:50%;background:var(--bg2);border:1px solid var(--bd);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--t2);margin-top:2px;}
.ag-item.active .ag-num{background:var(--o);color:white;border-color:var(--o);}
.ag-item.done .ag-num{background:var(--gr);color:white;border-color:var(--gr);}
.ag-lbl{font-size:11px;color:var(--t);line-height:1.3;}
.ag-item.active .ag-lbl{font-weight:700;color:var(--o);}
.ag-min{font-size:10px;color:var(--t2);margin-top:1px;}
.ag-next{width:100%;padding:8px;font-size:12px;font-weight:700;border:none;background:var(--o);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
.ag-next:hover{opacity:.9;}
.tab-next{display:flex;justify-content:flex-end;margin-top:10px;}
.tab-next-btn{font-size:12px;padding:7px 16px;border-radius:var(--rs);border:1px solid var(--o);color:var(--o);background:none;cursor:pointer;font-weight:700;display:flex;align-items:center;gap:5px;}
@media(max-width:680px){.app-layout{flex-direction:column;}.agenda-sidebar{width:100%;position:static;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="logo">
      <div class="logo-dot"><i class="ti ti-car"></i></div>
      <div>
        <div class="app-title" id="org-name">Journey Auto Repair</div>
        <div class="app-sub" id="meeting-name">Level 10 weekly meeting</div>
      </div>
    </div>
    <div class="hdr-r">
      <select id="wk-select" onchange="switchWeek(this.value)" style="font-size:12px;padding:5px 10px;border-radius:var(--rs);background:var(--o);color:#fff;font-weight:700;border:none;cursor:pointer;appearance:none;-webkit-appearance:none;min-width:100px;text-align:center">
        <option>Loading...</option>
      </select>
      <select id="meeting-type-select" onchange="switchMeetingType(this.value)" style="font-size:12px;padding:5px 10px;border-radius:var(--rs);border:2px solid var(--o);background:var(--bg);color:var(--o);font-weight:700;cursor:pointer">
        <option value="admin">Admin Sync</option>
        <option value="store">Store Sync</option>
        <option value="ministry">Ministry Sync</option>
        <option value="numbers">Number Crunchers</option>
      </select>
      <div id="timer-display" style="font-size:13px;font-weight:700;color:var(--t2);min-width:52px;text-align:center">00:00</div>
      <button class="ibtn" id="timer-btn" onclick="toggleTimer()" style="border-color:var(--gr);color:var(--gr)"><i class="ti ti-player-play"></i> Start</button>
      <button class="ibtn" onclick="openHistory()"><i class="ti ti-history"></i> History</button>
      <button class="ibtn" onclick="addWeek()"><i class="ti ti-calendar-plus"></i> New week</button>
      <button class="ibtn ob" onclick="openSettings()"><i class="ti ti-settings"></i> Settings</button>
    </div>
  </div>

  <div class="abar pend" id="abar">
    <div style="display:flex;align-items:center;gap:8px">
      <i class="ti ti-brand-microsoft" style="font-size:16px"></i>
      <span id="abar-txt">Sign in to connect Microsoft 365 — tasks sync to Planner & To Do automatically</span>
    </div>
    <button class="abtn si" id="abar-btn" onclick="handleAuth()">Sign in with Microsoft</button>
  </div>

  <div class="sgrid" id="sgrid"></div>

  <div class="app-layout">
    <div class="agenda-sidebar"><div class="ag-card"><div class="ag-hdr"><i class="ti ti-list-check" style="color:white;font-size:13px"></i><span>Agenda</span></div><div class="ag-progress"><div class="ag-bar" id="ag-bar" style="width:0%"></div></div><div id="ag-items"></div><button class="ag-next" onclick="agendaNext()"><i class="ti ti-arrow-right"></i> Next</button></div></div>
    <div class="main-content">
      <div class="nav" id="mainnav"></div>
      <div id="content"></div>
      <div class="tab-next"><button class="tab-next-btn" onclick="agendaNext()">Next <i class="ti ti-arrow-right"></i></button></div>
    </div>
  </div>

  <div class="moverlay" id="modal"><div class="modal">
    <div class="mtitle" id="mtitle">Add item</div>
    <div id="mfields"></div>
    <div class="mbtns"><button class="bcnl" onclick="closeModal()">Cancel</button><button class="bsav" onclick="saveModal()">Save</button></div>
  </div></div>

  <div class="soverlay" id="soverlay"><div class="spanel">
    <div class="shdr"><div class="stitle"><i class="ti ti-settings" style="color:var(--o);margin-right:6px"></i>Settings</div><button class="sclose" onclick="closeSettings()"><i class="ti ti-x"></i></button></div>
    <div class="sbody">
      <div class="ssec"><div class="ssectitle">Organization</div>
        <div class="srow"><label>Org name</label><input id="s-org"/></div>
        <div class="srow"><label>Meeting name</label><input id="s-mtg"/></div>
      </div>
      <div class="ssec"><div class="ssectitle">Main tabs</div>
        
        <div class="srow"><label>Tab 1 (Headlines)</label><input id="sn0"/></div>
        <div class="srow"><label>Tab 2 (Scorecard)</label><input id="sn1"/></div>
        <div class="srow"><label>Tab 3 (Rocks)</label><input id="sn2"/></div>
        <div class="srow"><label>Tab 4 (To-Dos)</label><input id="sn3"/></div>
        <div class="srow"><label>Tab 5 (IDS)</label><input id="sn4"/></div>
        <div class="srow"><label>Tab 6 (Conclude)</label><input id="sn5"/></div>
      </div>
      <div class="ssec"><div class="ssectitle">Scorecard sub-tabs</div>
        <div class="srow"><label>Sub-tab 1</label><input id="ss0"/></div>
        <div class="srow"><label>Sub-tab 2</label><input id="ss1"/></div>
        <div class="srow"><label>Sub-tab 3</label><input id="ss2"/></div>
        <div class="srow"><label>Sub-tab 4</label><input id="ss3"/></div>
      </div>
      <div class="ssec"><div class="ssectitle">Agenda items</div><div id="sagenda"></div></div>
    </div>
    <div class="sfoot">
      <button class="ssave" onclick="saveSettings()">Save settings</button>
      <button class="sreset" onclick="resetSettings()">Reset to defaults</button>
    </div>
  </div></div>

  <div id="content"></div>

  <!-- HISTORY MODAL -->
  <div class="moverlay" id="history-modal" style="z-index:1500">
    <div class="modal" style="width:680px;max-width:96vw;max-height:92vh">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
        <div class="mtitle" style="margin:0">Meeting history</div>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="history-week-select" onchange="renderHistoryWeek(this.value)" style="font-size:12px;padding:4px 8px"></select>
          <button class="bsav" onclick="exportSummary()" style="font-size:12px;padding:5px 12px"><i class="ti ti-download"></i> Export</button>
          <button class="bcnl" onclick="closeHistory()">Close</button>
        </div>
      </div>
      <div id="history-content" style="overflow-y:auto;max-height:75vh"></div>
    </div>
  </div>
</div>
<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
const CLIENT_ID='2e3191bd-33d5-4a17-bed6-120fe0476f6d';
const TENANT_ID='51d52d84-027d-48f3-8d09-628380cb4704';
const SCOPES='Tasks.ReadWrite Group.Read.All Group.ReadWrite.All User.Read User.ReadBasic.All Sites.ReadWrite.All Mail.Send';
const REDIRECT_URI=location.href.split('?')[0].split('#')[0];
const AUTH_URL=`https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize`;
const SP_HOST='journeyautorepair.sharepoint.com';
const SP_SITE='/sites/Level10MeetingData';
const SP_LIST='Level10AppData';
const SP_TITLE='SharedAppState';
// Hardcoded Planner plan — Journey Auto Level 10 Tasks
const FIXED_PLAN_ID='h8KG0NpqNkGvaiP7Y0_NMWUAD6t1';

// ── DEFAULTS ─────────────────────────────────────────────────────────────────
// ── MEETING TYPES ────────────────────────────────────────────────────────────
const MEETING_TYPES={
  admin:{
    label:'Admin Sync',
    members:['Andy','Pete','Devan','Najla'],

function wkLabel(off){
  // Always anchor to THIS Monday regardless of offset
  const d=new Date(),day=d.getDay(),m=new Date(d);
  m.setDate(d.getDate()-(day===0?6:day-1)+(off*7));
  return 'Wk '+m.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function thisMonday(){
  const d=new Date(),day=d.getDay(),m=new Date(d);
  m.setDate(d.getDate()-(day===0?6:day-1));
  m.setHours(0,0,0,0);
  return 'Wk '+m.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function curWeek(){return D.weeks[D.wkIdx]||D.weeks[D.weeks.length-1];}
function addWeek(){
  // Always add exactly 7 days after the last stored week
  // Parse the last week's date and add 7 days
  let nextDate;
  if(D.weeks.length>0){
    const last=D.weeks[D.weeks.length-1];
    // Parse "Wk Mon DD" or "Wk Mon D" format
    const parts=last.replace('Wk ','').split(' ');
    const months={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    const yr=new Date().getFullYear();
    const parsed=new Date(yr,months[parts[0]],parseInt(parts[1]));
    // If parsed date is in the past by more than 6 months, try next year
    if(!isNaN(parsed.getTime())){
      parsed.setDate(parsed.getDate()+7);
      nextDate=parsed;
    }
  }
  if(!nextDate){
    // Fallback: next Monday from today
    const d=new Date(),day=d.getDay(),m=new Date(d);
    m.setDate(d.getDate()-(day===0?6:day-1)+7);
    nextDate=m;
  }
  const n='Wk '+nextDate.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  if(!D.weeks.includes(n)){D.weeks.push(n);D.wkIdx=D.weeks.length-1;}
  save();render();
}

async function gGet(path,qs=''){const r=await fetch(`https://graph.microsoft.com/v1.0/${path}${qs}`,{headers:{Authorization:`Bearer ${msToken}`}});if(!r.ok)throw new Error(r.status);return r.json();}
async function gPost(path,body){const r=await fetch(`https://graph.microsoft.com/v1.0/${path}`,{method:'POST',headers:{Authorization:`Bearer ${msToken}`,'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function gPatch(path,body,etag){const h={Authorization:`Bearer ${msToken}`,'Content-Type':'application/json'};if(etag)h['If-Match']=etag;const r=await fetch(`https://graph.microsoft.com/v1.0/${path}`,{method:'PATCH',headers:h,body:JSON.stringify(body)});if(!r.ok)throw new Error(r.status);return r.status===204?null:r.json();}

// ── SHAREPOINT ────────────────────────────────────────────────────────────────
const SP_BASE=`https://graph.microsoft.com/v1.0/sites/${SP_HOST}:${SP_SITE}:/lists/${SP_LIST}`;
async function loadSP(force=false){
  try{
    // Get all items — don't filter by Title since it's not indexed
    // Our list only has one item so this is safe and fast
    const res=await fetch(`${SP_BASE}/items?$expand=fields&$top=10`,{
      headers:{Authorization:`Bearer ${msToken}`,'Accept':'application/json;odata.metadata=minimal'}
    });
    if(!res.ok){
      const errText=await res.text();
      console.warn('SP load failed:',res.status,errText);
      return false;
    }
    const data=await res.json();
    const items=data.value||[];
    // Find our shared state item by title
    const item=items.find(x=>x.fields?.Title===SP_TITLE)||items[0];
    if(item){
      spItemId=item.id;
      const json=item.fields?.JsonData;
      if(json){
        try{
          const remote=JSON.parse(json);
          const rh=JSON.stringify(remote);
          if(force||rh!==lastHash){
            D=remote;
            lastHash=rh;
            // Restore settings from shared data if present
            if(D.settings){
              ST=D.settings;
              // Strip legacy 7-tab navTabs that included Agenda tab
              if(ST.navTabs&&ST.navTabs.length===7)ST.navTabs=ST.navTabs.slice(1);
              saveSettings2(ST);
              applySettings();
            }
            // Migrate any root-level ids/todos into meetings structure
            migrateLegacyData();
            fixWeeks();
            saveLocal();
            console.log('Loaded shared data from SharePoint ✅');
            return true;
          }
        }catch(e){console.warn('SP parse error:',e);}
      }
    }else{
      console.log('No shared data found — creating initial record...');
      await pushSP();
    }
    return false;
  }catch(e){
    console.warn('loadSP error:',e);
    return false;
  }
}
async function pushSP(){
  try{
    const json=JSON.stringify(D);
    if(json===lastHash)return;
    lastHash=json;
    const body={fields:{Title:SP_TITLE,JsonData:json}};
    if(spItemId){
      await fetch(`${SP_BASE}/items/${spItemId}/fields`,{method:'PATCH',headers:{Authorization:`Bearer ${msToken}`,'Content-Type':'application/json'},body:JSON.stringify({JsonData:json})});
    }else{
      const r=await fetch(`${SP_BASE}/items`,{method:'POST',headers:{Authorization:`Bearer ${msToken}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(r.ok){const d=await r.json();spItemId=d.id;}
    }
  }catch(e){console.warn('pushSP error:',e);}
}
function startSync(){
  if(syncTimer)clearInterval(syncTimer);
  syncTimer=setInterval(async()=>{
    if(msToken){

}

    const bid=await ensureBucket('This Week');
    const ol=todo.owner.toLowerCase();
    const assignee=msMembers.find(m=>m.displayName===todo.owner||(m.mail&&m.mail.split('@')[0]===todo.owner)||m.displayName?.toLowerCase()===ol||m.displayName?.toLowerCase().startsWith(ol));
    const assignments={};
    if(assignee)assignments[assignee.id]={'@odata.type':'#microsoft.graph.plannerAssignment',orderHint:' !'};
    let due=null;try{const d=new Date(todo.due+', '+new Date().getFullYear());if(!isNaN(d.getTime()))due=d.toISOString();}catch(e){}
    const task=await gPost('planner/tasks',{planId:msPlanId,bucketId:bid||undefined,title:todo.task,assignments,dueDateTime:due});
    todo.plannerId=task.id;todo.plannerSynced=true;save();render();
    console.log('Planner task created:',todo.task);
  }catch(e){console.warn('createPlannerTask:',e);}
}
async function completePlannerTask(id){
  if(!msToken||!id)return;
  try{const t=await gGet(`planner/tasks/${id}`);await gPatch(`planner/tasks/${id}`,{percentComplete:100},t['@odata.etag']);}catch(e){}
}

function status(val,goal){
  if(val===''||val===null||val===undefined)return 'x';
  const v=parseFloat(val),g=parseFloat(goal);
  if(isNaN(v)||isNaN(g))return 'x';
  const p=v/g;return p>=1?'g':p>=.75?'a':'r';
}
function sbadge(val,goal){
  const s=status(val,goal),ic={g:'ti-check',r:'ti-x',a:'ti-minus',x:'ti-minus'},cl={g:'bg',r:'br',a:'ba',x:'bx'};
  return `<span class="bdg ${cl[s]}"><i class="ti ${ic[s]}" style="font-size:9px"></i></span>`;
}
function memberSelect(sel,fid){
  if(!msMembers.length)return `<div class="fld"><label>Assign to</label><input id="${fid}" placeholder="e.g. Andy" value="${sel}"/></div>`;
  const opts=msMembers.map(m=>`<option value="${m.displayName}" ${m.displayName===sel?'selected':''}>${m.displayName}</option>`).join('');
  return `<div class="fld"><label>Assign to</label><select id="${fid}">${opts}</select></div>`;
}

// ── TIMER ─────────────────────────────────────────────────────────────────────
function toggleTimer(){
  if(timerRunning){
    // Stop
    timerRunning=false;
    clearInterval(timerInterval);
    timerElapsed+=Math.floor((Date.now()-timerStart)/1000);
    timerStart=null;
    // Save duration for this meeting type
    const md=mData();
    if(!md.meetingDurations)md.meetingDurations={};
    md.meetingDurations[curWeek()]=timerElapsed;
    save();
    // Make sure we're viewing current week after stopping
    D.wkIdx=D.weeks.length-1;
    const btn=document.getElementById('timer-btn');
    if(btn){btn.innerHTML='<i class="ti ti-player-play"></i> Start';btn.style.borderColor='var(--gr)';btn.style.color='var(--gr)';}
    // Prompt to send summary email
    if(msToken){
      setTimeout(()=>showEmailPrompt(),300);
    }
  } else {
    // Start
    timerRunning=true;
    timerStart=Date.now();
    const btn=document.getElementById('timer-btn');
    if(btn){btn.innerHTML='<i class="ti ti-player-stop"></i> Stop';btn.style.borderColor='var(--re)';btn.style.color='var(--re)';}
    timerInterval=setInterval(updateTimerDisplay,1000);
  }
}
function updateTimerDisplay(){
  const el=document.getElementById('timer-display');
  if(!el)return;
  const total=timerElapsed+(timerRunning?Math.floor((Date.now()-timerStart)/1000):0);
  const m=Math.floor(total/60),s=total%60;
  el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  el.style.color=total>5400?'var(--re)':total>4800?'var(--am)':'var(--t2)';
}
function fmtDuration(secs){
  if(!secs)return'—';
  const m=Math.floor(secs/60),s=secs%60;
  return m+'m '+(s>0?s+'s':'');
}

`;

`;

`;
  txt+=`Team avg rating: ${avgRating?avgRating+'/4':'—'}

`;

${'─'.repeat(40)}

      <h2 style="font-size:14px;font-weight:700;color:#FE8630;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #FE8630;padding-bottom:6px;margin:24px 0 12px">⛰️ Rocks</h2>
      ${rocksHtml}

      <h2 style="font-size:14px;font-weight:700;color:#FE8630;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #FE8630;padding-bottom:6px;margin:24px 0 12px">👋 Headlines / Check-in</h2>
      ${hlHtml}

      <h2 style="font-size:14px;font-weight:700;color:#FE8630;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #FE8630;padding-bottom:6px;margin:24px 0 12px">✅ To-Dos Added This Meeting</h2>
      ${todosHtml}

      <h2 style="font-size:14px;font-weight:700;color:#FE8630;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #FE8630;padding-bottom:6px;margin:24px 0 12px">🔥 Issues (IDS)</h2>
      ${idsHtml}

      <h2 style="font-size:14px;font-weight:700;color:#FE8630;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #FE8630;padding-bottom:6px;margin:24px 0 12px">⭐ Meeting Ratings</h2>
      ${ratHtml}

      <div style="margin-top:32px;padding:16px;background:#f5f6f7;border-radius:6px;text-align:center;font-size:12px;color:#6b7280">
        Sent automatically by Journey Auto Repair Level 10 Meeting App<br/>
        <a href="https://acdauer.github.io/journey-level10/" style="color:#FE8630">Open the app</a>
      </div>
    </body></html>`;

    // Send via Microsoft Graph Mail API
    const toRecipients=mt.emails.map(e=>({emailAddress:{address:e}}));
    await fetch('https://graph.microsoft.com/v1.0/me/sendMail',{
      method:'POST',
      headers:{Authorization:`Bearer ${msToken}`,'Content-Type':'application/json'},
      body:JSON.stringify({
        message:{
          subject:`${mt.label} Meeting Summary — ${wk}`,
          body:{contentType:'HTML',content:emailHtml},
          toRecipients
        },
        saveToSentItems:true
      })
    });

    // Success
    if(overlay){
      overlay.innerHTML=`<div style="background:var(--bg);border-radius:var(--r);padding:2rem;text-align:center;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2)">
        <div style="font-size:36px;margin-bottom:12px">✅</div>
        <div style="font-size:15px;font-weight:700;color:var(--t);margin-bottom:6px">Summary sent!</div>
        <div style="font-size:13px;color:var(--t2);margin-bottom:16px">Emailed to ${mt.members.join(', ')}</div>
        <button onclick="document.getElementById('email-prompt-overlay').remove()" style="font-size:13px;padding:7px 20px;border-radius:var(--rs);border:none;background:var(--o);color:#fff;cursor:pointer;font-weight:700">Done</button>
      </div>`;
    }
  }catch(e){
    console.error('Email send error:',e);
    if(overlay){
      overlay.innerHTML=`<div style="background:var(--bg);border-radius:var(--r);padding:2rem;text-align:center;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2)">
        <div style="font-size:36px;margin-bottom:12px">❌</div>
        <div style="font-size:15px;font-weight:700;color:var(--t);margin-bottom:6px">Email failed to send</div>
        <div style="font-size:13px;color:var(--t2);margin-bottom:16px">Check that Mail.Send permission is granted in Azure</div>
        <button onclick="document.getElementById('email-prompt-overlay').remove()" style="font-size:13px;padding:7px 20px;border-radius:var(--rs);border:none;background:var(--o);color:#fff;cursor:pointer;font-weight:700">Close</button>
      </div>`;
    }
  }
}

// ── AGENDA SIDEBAR ───────────────────────────────────────────────────────────
function renderAgendaSidebar(){
  const items=ST.agendaItems;
  const wk=curWeek();
  const done=(mData().agDone&&mData().agDone[wk])||{};
  const pct=Math.round(((activeAgendaItem+1)/items.length)*100);
  const bar=document.getElementById("ag-bar");
  if(bar)bar.style.width=pct+"%";
  const el=document.getElementById("ag-items");
  if(!el)return;
  el.innerHTML=items.map((a,i)=>{
    const isActive=i===activeAgendaItem;
    const isDone=!!done[i];
    const numHtml=isDone?"<i class='ti ti-check' style='font-size:9px'></i>":(i+1);
    return "<div class='ag-item"+(isActive?" active":"")+(isDone?" done":"")+"' onclick='agendaGoTo("+i+")'><div class='ag-num'>"+numHtml+"</div><div><div class='ag-lbl'>"+a.label+"</div><div class='ag-min'>"+a.minutes+" min</div></div></div>";
  }).join("");
}
function agendaGoTo(i){
  activeAgendaItem=i;
  const map={0:"headlines",1:"scorecard",2:"rocks",3:"todos",4:"ids",5:"conclude"};
  const target=map[i];
  if(target){
    activeSection=target;
    document.querySelectorAll(".ntab").forEach((t,idx)=>{t.classList.toggle("active",DEF_KEYS[idx]===target);});
  }
  renderAgendaSidebar();
  const c=document.getElementById("content");
  if(!c)return;
  const fmap={agenda:rAgenda,headlines:rHeadlines,scorecard:rScorecard,rocks:rRocks,todos:rTodos,ids:rIDS,conclude:rConclude};
  c.innerHTML=(fmap[activeSection]||rAgenda)();
  if(!D.sharedTimer)D.sharedTimer={};
  D.sharedTimer.agendaItem=activeAgendaItem;
  saveLocal();
  if(msToken)saveSection("timer");
}
function agendaNext(){
  if(activeAgendaItem<ST.agendaItems.length-1)agendaGoTo(activeAgendaItem+1);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  renderAgendaSidebar();
  // Summary
  const wk=curWeek();
  const sel=document.getElementById('wk-select');
  if(sel){
    sel.innerHTML=[...D.weeks].reverse().map(w=>`<option value="${w}" ${w===wk?'selected':''}>${w}</option>`).join('');
  }
  const md=mData();
  const mtScKeys=curMeeting().scKeys;
  const allSC=mtScKeys.map(k=>D.scorecard[k]||[]).flat();
  const scOn=allSC.filter(r=>status(r.values[wk],r.goal)==='g').length;
  const openT=(md.todos||[]).filter(t=>t.status==='open').length;
  const openI=(md.ids||[]).filter(i=>i.status==='open').length;
  const rOn=getRocks().filter(r=>r.status==='on').length;
  const sg=document.getElementById('sgrid');
  if(sg)sg.innerHTML=`
    <div class="scard"><div class="slbl">Scorecard on track</div><div class="sval ${scOn===allSC.length&&allSC.length>0?'cg':'ca'}">${scOn}/${allSC.length}</div><div class="ssub">metrics this week</div></div>
    <div class="scard"><div class="slbl">Rocks on track</div><div class="sval ${rOn===D.rocks.length&&D.rocks.length>0?'cg':'ca'}">${rOn}/${getRocks().length||0}</div><div class="ssub">quarterly rocks</div></div>
    <div class="scard"><div class="slbl">Open to-dos</div><div class="sval ${openT===0?'cg':'ca'}">${openT}</div><div class="ssub">need completion</div></div>
    <div class="scard"><div class="slbl">Open issues</div><div class="sval ${openI===0?'cg':'cr'}">${openI}</div><div class="ssub">in IDS queue</div></div>`;
  // Nav
  const nav=document.getElementById('mainnav');
  if(nav)nav.innerHTML=DEF_KEYS.map((k,i)=>`<div class="ntab ${activeSection===k?'active':''}" onclick="sw('${k}',this)"><i class="ti ${DEF_ICONS[i]}"></i>${ST.navTabs[i]||DEF_NAV[i]}</div>`).join('');
  // Content
  const c=document.getElementById('content');if(!c)return;
  const map={headlines:rHeadlines,scorecard:rScorecard,rocks:rRocks,todos:rTodos,ids:rIDS,conclude:rConclude};
  c.innerHTML=(map[activeSection]||rAgenda)();
}

function sw(s,el){
  // Flush any unsaved rock field values before navigating away
  if(activeSection==='rocks'){
    const rocks=getRocks();
    rocks.forEach(function(r,i){
      var f30=document.querySelector('[data-i="'+i+'"][data-f="milestone30"]');
      var f60=document.querySelector('[data-i="'+i+'"][data-f="milestone60"]');
      var fn=document.querySelector('[data-i="'+i+'"][data-f="notes"]');
      if(f30&&f30.value!==r.milestone30)r.milestone30=f30.value;
      if(f60&&f60.value!==r.milestone60)r.milestone60=f60.value;
      if(fn&&fn.value!==r.notes)r.notes=fn.value;
    });
    saveLocal();
    if(msToken)pushSP().catch(function(e){console.warn(e);});
  }
  activeSection=s;
  document.querySelectorAll('.ntab').forEach(function(t){t.classList.remove('active');});
  if(el)el.classList.add('active');
  const agMap={headlines:0,scorecard:1,rocks:2,todos:3,ids:4,conclude:5};
  if(agMap[s]!==undefined)activeAgendaItem=agMap[s];
  render();
}

// ── AGENDA ────────────────────────────────────────────────────────────────────
function rAgenda(){
  const wk=curWeek(),md=mData(),done=(md.agDone&&md.agDone[wk])||{},items=ST.agendaItems;
  const rows=items.map((a,i)=>`<div class="arow"><div class="anum">${i+1}</div><div style="flex:1;font-size:13px;${done[i]?'text-decoration:line-through;color:var(--t2)':''}">${a.label}</div><div style="display:flex;align-items:center;gap:10px"><span style="font-size:11px;color:var(--t2)">${a.minutes} min</span><input type="checkbox" ${done[i]?'checked':''} onchange="togAg(${i})" style="width:16px;height:16px;accent-color:var(--o);cursor:pointer"/></div></div>`).join('');
  const tot=items.reduce((s,a)=>s+a.minutes,0);
  return `<div class="card"><div class="chdr"><div class="chl"><i class="ti ti-list-check"></i><div><div class="ctitle">${ST.navTabs[0]}</div><div class="csub">${tot} min total</div></div></div><span class="tbadge">${tot} min</span></div>${rows}</div>`;
}
function togAg(i){const wk=curWeek(),md=mData();if(!md.agDone)md.agDone={};if(!md.agDone[wk])md.agDone[wk]={};md.agDone[wk][i]=!md.agDone[wk][i];save();render();}

// ── HEADLINES ─────────────────────────────────────────────────────────────────
function rHeadlines(){
  const wk=curWeek(),md=mData();
  if(!md.headlines||!md.headlines.length){
    md.headlines=curMeeting().members.map((p,i)=>({id:i+1,person:p,text:'',weekData:{}}));
  }
  const rows=md.headlines.map((h,i)=>{
    if(!h.weekData)h.weekData={};
    const val=h.weekData[wk]||'';
    return `<div class="hlrow"><div class="hlp">${h.person}</div><input class="tf" value="${val}" placeholder="Type headline here..." oninput="updHL(${i},this.value)"/></div>`;
  }).join('');
  return `<div class="card"><div class="chdr"><div class="chl"><i class="ti ti-speakerphone"></i><div><div class="ctitle">${ST.navTabs[1]}</div><div class="csub">${curMeeting().label} — fill in before the meeting</div></div></div><a href="https://feelingswheel.com/" target="_blank" rel="noopener noreferrer" style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--o);text-decoration:none;padding:4px 10px;border-radius:var(--rs);border:1px solid var(--o);white-space:nowrap"><i class="ti ti-mood-smile"></i> Feelings wheel</a></div>${rows}<button class="addbtn" onclick="openModal('hl')"><i class="ti ti-plus"></i> Add person</button></div>`;
}
function updHL(i,v){
  const wk=curWeek(),md=mData();
  if(!md.headlines[i].weekData)md.headlines[i].weekData={};
  md.headlines[i].weekData[wk]=v;
  md.headlines[i].text=v;
  save();
}

// ── SCORECARD ─────────────────────────────────────────────────────────────────
function rScorecard(){
  const mtScKeys=curMeeting().scKeys;
  const key=mtScKeys[activeSCTab]||mtScKeys[0],rows=D.scorecard[key],vis=D.weeks.slice(-5);
  const thW=vis.map(w=>`<th style="text-align:center;min-width:70px">${w}</th>`).join('');
  let tbody='';
  if(!rows.length)tbody=`<tr><td colspan="${4+vis.length}" style="padding:2rem;text-align:center;color:var(--t2)">No metrics yet</td></tr>`;
  else rows.forEach((r,ri)=>{
    const tds=vis.map((w,wi)=>{
      const isCur=wi===vis.length-1,val=r.values[w]!==undefined?r.values[w]:'';
      if(isCur)return `<td style="text-align:center"><input class="ni" style="width:62px" type="number" min="0" value="${val}" placeholder="—" oninput="updSC('${key}',${ri},'${w}',this.value)"/></td>`;
      return `<td style="text-align:center;color:var(--t2)">${val!==''?val:'—'}</td>`;
    }).join('');
    const cv=r.values[vis[vis.length-1]]??'';
    tbody+=`<tr><td style="width:24%"><input class="ie" value="${r.metric}" oninput="updSCF('${key}',${ri},'metric',this.value)"/>${r.freq&&r.freq!=='Weekly'?`<div class="fn">${r.freq}</div>`:''}</td><td style="width:13%"><input class="ie" value="${r.owner}" oninput="updSCF('${key}',${ri},'owner',this.value)"/></td><td style="width:9%;text-align:center"><input class="ien" type="number" min="0" value="${r.goal}" oninput="updSCF('${key}',${ri},'goal',this.value)"/></td>${tds}<td style="width:8%;text-align:center">${sbadge(cv,r.goal)}</td><td style="width:32px;text-align:center"><button class="rbtn" onclick="delSC('${key}',${ri})"><i class="ti ti-trash" style="font-size:12px"></i></button></td></tr>`;
  });
  const mtScTabs=curMeeting().scTabs;
  const tabs=mtScTabs.map((t,i)=>`<div class="sctab ${i===activeSCTab?'active':''}" onclick="swSC(${i})">${t}</div>`).join('');
  return `<div class="card"><div class="chdr"><div class="chl"><i class="ti ti-chart-bar"></i><div><div class="ctitle">${ST.navTabs[2]}</div><div class="csub">Last 5 weeks — fill in before the meeting</div></div></div><span class="tbadge">5 min</span></div><div class="sctabs">${tabs}</div><div class="twrap"><table><thead><tr><th style="width:24%">Metric</th><th style="width:13%">Owner</th><th style="width:9%;text-align:center">Goal</th>${thW}<th style="width:8%;text-align:center">Status</th><th style="width:32px"></th></tr></thead><tbody>${tbody}</tbody></table></div><div class="ehint"><i class="ti ti-pencil" style="color:var(--o)"></i> Click any metric, owner, or goal to edit</div><button class="addbtn" onclick="openModal('sc')"><i class="ti ti-plus"></i> Add metric</button></div>`;
}
function swSC(i){activeSCTab=i;render();}
function updSC(k,ri,wk,v){D.scorecard[k][ri].values[wk]=v;save();render();}
function updSCF(k,ri,f,v){D.scorecard[k][ri][f]=v;save();}
function delSC(k,ri){if(confirm('Delete this metric?')){D.scorecard[k].splice(ri,1);save();render();}}

// ── ROCKS ─────────────────────────────────────────────────────────────────────
function rRocks(){
  const rocks=getRocks();
  const pl={on:'pon',off:'pof',risk:'pri'};
  const lb={on:'On track',off:'Off track',risk:'At risk'};
  if(!rocks.length){
    return '<div class="card"><div class="chdr"><div class="chl"><i class="ti ti-mountain"></i><div><div class="ctitle">'+ST.navTabs[2]+'</div><div class="csub">90-day priorities</div></div></div><span class="tbadge">5 min</span></div><div style="padding:2rem;text-align:center;color:var(--t2);font-size:13px">No rocks this quarter</div><button class="addbtn" onclick="openModal(\'rock\')"><i class="ti ti-plus"></i> Add rock</button></div>';
  }
  let rows='';
  rocks.forEach(function(r,i){
    if(!r.notes)r.notes='';
    if(!r.milestone30)r.milestone30='';
    if(!r.milestone60)r.milestone60='';
    var div=document.createElement('div');
    div.className='cw';
    div.style.cssText='flex-direction:column;gap:0;align-items:stretch';

    // Top row: status + title + owner/due + select + delete
    var topRow=document.createElement('div');
    topRow.style.cssText='display:flex;align-items:flex-start;gap:10px';

    var left=document.createElement('div');
    left.style.flex='1';

    var titleRow=document.createElement('div');
    titleRow.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:4px';
    var pill=document.createElement('span');
    pill.className='pill '+(pl[r.status]||'pon');
    pill.textContent=lb[r.status]||'On track';
    var rockIn=document.createElement('input');
    rockIn.className='ie';
    rockIn.value=r.rock;
    rockIn.style.cssText='font-weight:700;font-size:13px';
    rockIn.setAttribute('data-i',i);
    rockIn.setAttribute('data-f','rock');
    rockIn.oninput=function(){updRF(+this.getAttribute('data-i'),this.getAttribute('data-f'),this.value);};
    titleRow.appendChild(pill);
    titleRow.appendChild(rockIn);
    left.appendChild(titleRow);

    var metaRow=document.createElement('div');
    metaRow.style.cssText='font-size:11px;color:var(--t2);display:flex;gap:8px;align-items:center;flex-wrap:wrap';
    var oSpan=document.createElement('span');oSpan.textContent='Owner:';
    var ownerIn=document.createElement('input');
    ownerIn.className='ie';ownerIn.value=r.owner;ownerIn.style.cssText='font-size:11px;width:110px';
    ownerIn.setAttribute('data-i',i);ownerIn.setAttribute('data-f','owner');
    ownerIn.oninput=function(){updRF(+this.getAttribute('data-i'),this.getAttribute('data-f'),this.value);};
    var dSpan=document.createElement('span');dSpan.textContent='Due:';
    var dueIn=document.createElement('input');
    dueIn.className='ie';dueIn.value=r.due;dueIn.style.cssText='font-size:11px;width:100px';
    dueIn.setAttribute('data-i',i);dueIn.setAttribute('data-f','due');
    dueIn.oninput=function(){updRF(+this.getAttribute('data-i'),this.getAttribute('data-f'),this.value);};
    metaRow.appendChild(oSpan);metaRow.appendChild(ownerIn);
    metaRow.appendChild(dSpan);metaRow.appendChild(dueIn);
    left.appendChild(metaRow);
    topRow.appendChild(left);

    var right=document.createElement('div');
    right.style.cssText='display:flex;gap:6px;align-items:center;flex-shrink:0';
    var sel=document.createElement('select');
    sel.style.fontSize='11px';
    [['on','On track'],['risk','At risk'],['off','Off track']].forEach(function(opt){
      var o=document.createElement('option');
      o.value=opt[0];o.textContent=opt[1];
      if(r.status===opt[0])o.selected=true;
      sel.appendChild(o);
    });
    sel.setAttribute('data-i',i);
    sel.onchange=function(){updRS(+this.getAttribute('data-i'),this.value);};
    var delBtn=document.createElement('button');
    delBtn.className='rbtn';
    delBtn.innerHTML='<i class="ti ti-trash" style="font-size:12px"></i>';
    delBtn.setAttribute('data-i',i);
    delBtn.onclick=function(){delR(+this.getAttribute('data-i'));};
    right.appendChild(sel);right.appendChild(delBtn);
    topRow.appendChild(right);
    div.appendChild(topRow);

    // Milestone grid
    var grid=document.createElement('div');
    grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px';
    ['milestone30','milestone60'].forEach(function(field,fi){
      var cell=document.createElement('div');
      var lbl=document.createElement('div');
      lbl.style.cssText='font-size:10px;font-weight:700;color:var(--o);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px';
      lbl.textContent=(fi===0?'30':'60')+'-day milestone';
      var ta=document.createElement('textarea');
      ta.style.cssText='width:100%;font-size:12px;color:var(--t);padding:6px 8px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--bg2);resize:vertical;min-height:56px';
      ta.placeholder='What should be done in '+(fi===0?'30':'60')+' days?';
      ta.value=r[field];
      ta.setAttribute('data-i',i);ta.setAttribute('data-f',field);
      ta.oninput=function(){saveRockField(+this.getAttribute('data-i'),this.getAttribute('data-f'),this.value);};
      cell.appendChild(lbl);cell.appendChild(ta);
      grid.appendChild(cell);
    });
    div.appendChild(grid);

    // Notes
    var notesWrap=document.createElement('div');
    notesWrap.style.marginTop='8px';
    var notesLbl=document.createElement('div');
    notesLbl.style.cssText='font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px';
    notesLbl.textContent='Notes';
    var notesTA=document.createElement('textarea');
    notesTA.style.cssText='width:100%;font-size:12px;color:var(--t);padding:6px 8px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--bg2);resize:vertical;min-height:48px';
    notesTA.placeholder='Add notes, updates, or context...';
    notesTA.value=r.notes;
    notesTA.setAttribute('data-i',i);notesTA.setAttribute('data-f','notes');
    notesTA.oninput=function(){saveRockField(+this.getAttribute('data-i'),this.getAttribute('data-f'),this.value);};
    notesWrap.appendChild(notesLbl);notesWrap.appendChild(notesTA);
    div.appendChild(notesWrap);

    rows+=div.outerHTML;
  });
  return '<div class="card"><div class="chdr"><div class="chl"><i class="ti ti-mountain"></i><div><div class="ctitle">'+ST.navTabs[2]+'</div><div class="csub">90-day priorities</div></div></div><span class="tbadge">5 min</span></div>'+rows+'<button class="addbtn" onclick="openModal(\'rock\')"><i class="ti ti-plus"></i> Add rock</button></div>';
}



function updRF(i,f,v){const r=getRocks();if(!r[i])return;r[i][f]=v;saveLocal();if(msToken)pushSP().catch(e=>console.warn(e));}
function updRS(i,v){const r=getRocks();if(!r[i])return;r[i].status=v;save();render();}
function forcePush(){if(msToken){lastHash='';pushSP().catch(e=>console.warn('forcePush error:',e));}}
function delR(i){if(confirm('Delete this rock?')){const r=getRocks();r.splice(i,1);save();render();}}
function saveRockField(i,field,val){const rocks=getRocks();if(!rocks[i])return;rocks[i][field]=val;saveLocal();if(msToken)pushSP().catch(e=>console.warn(e));}

// ── TO-DOS ────────────────────────────────────────────────────────────────────
function rTodos(){
  const md=mData();
  if(!md.todos)md.todos=[];
  const open=md.todos.filter(t=>t.status==='open');
  const carry=md.todos.filter(t=>t.status==='carry');
  const done=md.todos.filter(t=>t.status==='done');
  const dropped=md.todos.filter(t=>t.status==='dropped');

  function tr(t,editable=true){
    const i=md.todos.indexOf(t);
    const isDone=t.status==='done'||t.status==='dropped';
    const statusColor={open:'var(--o)',done:'var(--gr)',carry:'var(--am)',dropped:'var(--t2)'};
    const statusIcon={open:'ti-circle',done:'ti-circle-check',carry:'ti-refresh',dropped:'ti-x'};

    if(!editable){
      // Collapsed read-only view for done/dropped
      return `<div style="display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid var(--bd);opacity:0.8">
        <i class="ti ${statusIcon[t.status]}" style="color:${statusColor[t.status]};font-size:15px;flex-shrink:0"></i>
        <span style="font-size:12px;color:var(--t);flex:1;${isDone?'text-decoration:line-through;color:var(--t2)':''}">${t.task}</span>
        <span style="font-size:11px;color:var(--t2)">→ ${t.owner}</span>
        <button onclick="reopenTodo(${i})" style="font-size:10px;padding:2px 7px;border-radius:var(--rs);border:1px solid var(--bd);color:var(--t2);background:none;cursor:pointer">Reopen</button>
        <button onclick="delT(${i})" style="background:none;border:none;cursor:pointer;color:var(--t2);padding:2px 4px"><i class="ti ti-x" style="font-size:11px"></i></button>
      </div>`;
    }

    return `<div style="background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);padding:10px 14px;margin-bottom:8px">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <input type="checkbox" ${t.status==='done'?'checked':''} onchange="togT(${i})"
          style="width:16px;height:16px;accent-color:var(--o);cursor:pointer;flex-shrink:0;margin-top:3px"/>
        <div style="flex:1">
          <input class="ie" value="${t.task}"
            style="font-size:13px;font-weight:600;width:100%;margin-bottom:6px;${isDone?'text-decoration:line-through;color:var(--t2)':''}"
            oninput="updTF(${i},'task',this.value)"
            placeholder="Task description"/>
          ${t.notes||!isDone?`<div style="margin-bottom:6px">
            ${t.notes?`<div style="font-size:11px;color:var(--t2);margin-bottom:3px;display:flex;align-items:center;gap:4px"><i class="ti ti-notes" style="font-size:12px;color:var(--o)"></i> Notes</div>
            <textarea id="todo-note-${i}" style="font-size:12px;color:var(--t2);width:100%;resize:vertical;min-height:48px;padding:4px 6px;border:1px dashed var(--bd);border-radius:4px;background:var(--bg2);display:block;margin-bottom:5px" placeholder="Add notes...">${t.notes}</textarea>
            <button onclick="saveTodoNote(${i})" style="font-size:11px;padding:3px 10px;border-radius:var(--rs);border:none;background:var(--o);color:#fff;cursor:pointer;font-weight:700;display:flex;align-items:center;gap:4px"><i class="ti ti-device-floppy"></i> Save note</button>`
            :`<button onclick="toggleTodoNotes(${i})" style="font-size:11px;padding:2px 8px;border-radius:var(--rs);border:1px dashed var(--bd);color:var(--t2);background:none;cursor:pointer;display:flex;align-items:center;gap:4px"><i class="ti ti-notes"></i> Add notes</button>`}
          </div>`:''}
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <div style="display:flex;align-items:center;gap:4px">
              <span style="font-size:11px;color:var(--t2)">Owner:</span>
              <input class="ie" value="${t.owner}" style="font-size:11px;color:var(--t2);width:90px"
                oninput="updTF(${i},'owner',this.value)"/>
            </div>
            <div style="display:flex;align-items:center;gap:4px">
              <span style="font-size:11px;color:var(--t2)">Due:</span>
              <input class="ie" value="${t.due}" style="font-size:11px;color:var(--t2);width:70px"
                oninput="updTF(${i},'due',this.value)"/>
            </div>
            ${t.plannerSynced?'<span class="ptag">✓ Planner</span>':''}
            <div style="margin-left:auto;display:flex;gap:4px">
              <select onchange="updTS(${i},this.value)"
                style="font-size:11px;padding:2px 6px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--bg2);color:var(--t);cursor:pointer">
                <option value="open" ${t.status==='open'?'selected':''}>Open</option>
                <option value="done" ${t.status==='done'?'selected':''}>Done</option>
                <option value="carry" ${t.status==='carry'?'selected':''}>Carry over</option>
                <option value="dropped" ${t.status==='dropped'?'selected':''}>Dropped</option>
              </select>
              <button onclick="delT(${i})" style="font-size:11px;padding:2px 6px;border-radius:var(--rs);border:1px solid var(--bd);color:var(--t2);background:none;cursor:pointer"><i class="ti ti-trash"></i></button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }

  const syncNote=msToken&&msPlanId
    ?`<div class="notice gn"><i class="ti ti-brand-microsoft"></i> New to-dos sync to Microsoft Planner & To Do automatically</div>`
    :`<div class="notice am"><i class="ti ti-brand-microsoft"></i> Sign in to auto-sync tasks to Planner & To Do</div>`;

  let h=`<div class="card">
    <div class="chdr">
      <div class="chl"><i class="ti ti-checkbox"></i>
        <div>
          <div class="ctitle">${ST.navTabs[4]}</div>
          <div class="csub">${open.length} open · ${carry.length} carry over · ${done.length} done</div>
        </div>
      </div>
      <span class="tbadge">5 min</span>
    </div>
    ${syncNote}
    <div style="padding:12px 14px">`;

  if(!md.todos.length){
    h+=`<div style="padding:1.5rem;text-align:center;color:var(--t2);font-size:13px">No to-dos yet — add one below</div>`;
  } else {
    // Open items — fully editable cards
    if(open.length){
      h+=`<div style="font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Open</div>`;
      h+=open.map(t=>tr(t,true)).join('');
    }
    // Carry over — fully editable cards
    if(carry.length){
      h+=`<div style="font-size:11px;font-weight:700;color:var(--am);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 8px;padding-top:8px;border-top:1px solid var(--bd)">Carried over</div>`;
      h+=carry.map(t=>tr(t,true)).join('');
    }
    // Done — collapsed read-only rows
    if(done.length||dropped.length){
      h+=`<div style="font-size:11px;font-weight:700;color:var(--gr);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 6px;padding-top:8px;border-top:1px solid var(--bd)">Completed / Dropped</div>`;
      h+=done.map(t=>tr(t,false)).join('');
      h+=dropped.map(t=>tr(t,false)).join('');
    }
  }

  h+=`</div>
    <div class="ehint"><i class="ti ti-pencil" style="color:var(--o)"></i> Click any task name, owner, or due date to edit directly</div>
    <button class="addbtn" onclick="openModal('todo')"><i class="ti ti-plus"></i> Add to-do</button>
  </div>`;
  return h;
}

function togT(i){
  const md=mData();
  md.todos[i].status=md.todos[i].status==='done'?'open':'done';
  if(md.todos[i].status==='done'&&md.todos[i].plannerId)completePlannerTask(md.todos[i].plannerId);
  save();render();
}
function reopenTodo(i){const md=mData();md.todos[i].status='open';save();render();}
function toggleTodoNotes(i){const md=mData();md.todos[i].notes=md.todos[i].notes||' ';save();render();}
function saveTodoNote(i){
  const el=document.getElementById('todo-note-'+i);
  if(!el)return;
  const md=mData();
  md.todos[i].notes=el.value;
  save();forcePush();
  // Visual feedback
  const btn=el.nextElementSibling;
  if(btn){
    const orig=btn.innerHTML;
    btn.innerHTML='<i class="ti ti-check"></i> Saved!';
    btn.style.background='var(--gr)';
    setTimeout(()=>{btn.innerHTML=orig;btn.style.background='var(--o)';},1500);
  }
}
function toggleIdsNotes(i){const md=mData();md.ids[i].notes=md.ids[i].notes||' ';save();render();}
function saveIdsNote(i){
  const el=document.getElementById('ids-note-'+i);
  if(!el)return;
  const md=mData();
  md.ids[i].notes=el.value;
  save();forcePush();
  // Visual feedback
  const btn=el.nextElementSibling;
  if(btn){
    const orig=btn.innerHTML;
    btn.innerHTML='<i class="ti ti-check"></i> Saved!';
    btn.style.background='var(--gr)';
    setTimeout(()=>{btn.innerHTML=orig;btn.style.background='var(--o)';},1500);
  }
}
function updTF(i,f,v){const md=mData();md.todos[i][f]=v;save();}
function updTS(i,v){const md=mData();md.todos[i].status=v;save();render();}
function delT(i){if(confirm('Delete this to-do?')){const md=mData();md.todos.splice(i,1);save();render();}}


function rIDS(){
  const md=mData();
  if(!md.ids)md.ids=[];
  const open=md.ids.filter(x=>x.status==='open');
  const solved=md.ids.filter(x=>x.status==='solved');

  function irOpen(x){
    const i=md.ids.indexOf(x);
    const pc={high:'hi',med:'me',low:'lo'};
    return `<div class="ids-row" draggable="true" data-idx="${i}"
      ondragstart="idsDragStart(event,${i})"
      ondragover="idsDragOver(event)"
      ondrop="idsDrop(event,${i})"
      ondragend="idsDragEnd(event)"
      style="background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;cursor:grab">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <i class="ti ti-grip-vertical" style="color:var(--t2);font-size:16px;margin-top:2px;flex-shrink:0;cursor:grab"></i>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap">
            <span class="iph ${pc[x.priority]||'me'}">${x.priority||'med'}</span>
            <input class="ie" value="${x.issue}" style="font-weight:700;font-size:13px;flex:1;min-width:120px" oninput="updIF(${i},'issue',this.value)"/>
          </div>
          <div style="font-size:11px;color:var(--t2);margin-bottom:8px">Raised by:
            <input class="ie" value="${x.raisedBy}" style="font-size:11px;color:var(--t2);width:100px" oninput="updIF(${i},'raisedBy',this.value)"/>
          </div>
          ${x.notes?`<div style="margin-bottom:8px">
            <div style="font-size:11px;color:var(--t2);margin-bottom:3px;display:flex;align-items:center;gap:4px"><i class="ti ti-notes" style="font-size:12px;color:var(--o)"></i> Notes</div>
            <textarea id="ids-note-${i}" style="font-size:12px;color:var(--t2);width:100%;resize:vertical;min-height:48px;padding:4px 6px;border:1px dashed var(--bd);border-radius:4px;background:var(--bg2);display:block;margin-bottom:5px" placeholder="Add notes...">${x.notes}</textarea>
            <button onclick="saveIdsNote(${i})" style="font-size:11px;padding:3px 10px;border-radius:var(--rs);border:none;background:var(--o);color:#fff;cursor:pointer;font-weight:700;display:flex;align-items:center;gap:4px"><i class="ti ti-device-floppy"></i> Save note</button>
          </div>`
          :`<button onclick="toggleIdsNotes(${i})" style="font-size:11px;padding:2px 8px;margin-bottom:8px;border-radius:var(--rs);border:1px dashed var(--bd);color:var(--t2);background:none;cursor:pointer;display:flex;align-items:center;gap:4px"><i class="ti ti-notes"></i> Add notes</button>`}
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button onclick="idsAddAction(${i})" style="font-size:11px;padding:4px 10px;border-radius:var(--rs);border:1px solid var(--o);color:var(--o);background:none;cursor:pointer;font-weight:700;display:flex;align-items:center;gap:4px"><i class="ti ti-checkbox"></i> Make action</button>
            <button onclick="idsComplete(${i})" style="font-size:11px;padding:4px 10px;border-radius:var(--rs);border:1px solid var(--gr);color:var(--gr);background:none;cursor:pointer;font-weight:700;display:flex;align-items:center;gap:4px"><i class="ti ti-check"></i> Complete</button>
            <button onclick="delI(${i})" style="font-size:11px;padding:4px 10px;border-radius:var(--rs);border:1px solid var(--bd);color:var(--t2);background:none;cursor:pointer;display:flex;align-items:center;gap:4px"><i class="ti ti-trash"></i></button>
          </div>
        </div>
      </div>
    </div>`;
  }

  function irSolved(x){
    const i=md.ids.indexOf(x);
    return `<details style="margin-bottom:6px;border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden">
      <summary style="padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;background:var(--bg2);list-style:none;font-size:12px">
        <i class="ti ti-check" style="color:var(--gr);font-size:13px"></i>
        <span style="font-weight:700;color:var(--t);flex:1">${x.issue}</span>
        <span style="font-size:11px;color:var(--t2)">Resolved · ${x.raisedBy}</span>
      </summary>
      <div style="padding:10px 14px;font-size:12px">
        ${x.outcome?`<div style="color:var(--t);margin-bottom:6px"><strong style="color:var(--gr)">Outcome:</strong> ${x.outcome}</div>`:'<div style="color:var(--t2)">No outcome note recorded</div>'}
        <button onclick="delI(${i})" style="font-size:11px;padding:3px 8px;border-radius:var(--rs);border:1px solid var(--bd);color:var(--t2);background:none;cursor:pointer;margin-top:6px"><i class="ti ti-trash"></i> Remove</button>
      </div>
    </details>`;
  }

  let openHtml = open.length
    ? open.map(irOpen).join('')
    : `<div style="padding:2rem;text-align:center;color:var(--t2);font-size:13px">No open issues — great week!</div>`;

  let solvedHtml = solved.length
    ? `<div style="font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 8px;padding-top:10px;border-top:1px solid var(--bd)">Resolved this meeting</div>`
      + solved.map(irSolved).join('')
    : '';

  return `<div class="card">
    <div class="chdr">
      <div class="chl"><i class="ti ti-flame"></i>
        <div>
          <div class="ctitle">${ST.navTabs[5]}</div>
          <div class="csub">${open.length} open · ${solved.length} resolved · drag to reorder</div>
        </div>
      </div>
      <span class="tbadge">60 min</span>
    </div>
    <div style="padding:12px 14px">
      ${openHtml}
      ${solvedHtml}
    </div>
    <button class="addbtn" onclick="openModal('ids')"><i class="ti ti-plus"></i> Add issue</button>
  </div>`;
}

// ── IDS DRAG AND DROP ─────────────────────────────────────────────────────────
let dragSrcIdx=null;
function idsDragStart(e,i){
  dragSrcIdx=i;
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.style.opacity='0.5';
}
function idsDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';}
function idsDrop(e,targetIdx){
  e.preventDefault();
  if(dragSrcIdx===null||dragSrcIdx===targetIdx)return;
  const md=mData();
  const moved=md.ids.splice(dragSrcIdx,1)[0];
  md.ids.splice(targetIdx,0,moved);
  dragSrcIdx=null;
  save();render();
}
function idsDragEnd(e){e.currentTarget.style.opacity='1';dragSrcIdx=null;}

// ── IDS COMPLETE WITH OUTCOME NOTE ───────────────────────────────────────────
function idsComplete(i){
  const md=mData();
  const issue=md.ids[i];
  // Show outcome prompt overlay
  const overlay=document.createElement('div');
  overlay.id='ids-complete-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:3000;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML=`
    <div style="background:var(--bg);border-radius:var(--r);border:1px solid var(--bd);padding:1.5rem;width:420px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.2)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">
        <div style="width:34px;height:34px;border-radius:50%;background:var(--gr);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="ti ti-check" style="color:#fff;font-size:17px"></i></div>
        <div>
          <div style="font-size:14px;font-weight:700;color:var(--t)">Resolve issue</div>
          <div style="font-size:12px;color:var(--t2);margin-top:1px">${issue.issue}</div>
        </div>
      </div>
      <div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em">Outcome / notes</div>
      <textarea id="ids-outcome-input" placeholder="What was decided or resolved? (optional)" style="width:100%;font-size:13px;padding:8px 10px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--bg);color:var(--t);resize:vertical;min-height:80px;margin-bottom:14px"></textarea>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button onclick="document.getElementById('ids-complete-overlay').remove()" style="font-size:13px;padding:7px 14px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--bg);color:var(--t);cursor:pointer">Cancel</button>
        <button onclick="idsConfirmComplete(${i})" style="font-size:13px;padding:7px 14px;border-radius:var(--rs);border:none;background:var(--gr);color:#fff;cursor:pointer;font-weight:700"><i class="ti ti-check"></i> Mark resolved</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>document.getElementById('ids-outcome-input')?.focus(),50);
}
function idsConfirmComplete(i){
  const md=mData();
  const outcome=document.getElementById('ids-outcome-input')?.value.trim()||'';
  md.ids[i].status='solved';
  md.ids[i].outcome=outcome;
  document.getElementById('ids-complete-overlay')?.remove();
  save();render();
}

// ── IDS → MAKE ACTION (TO-DO) ────────────────────────────────────────────────
function idsAddAction(i){
  const md=mData();
  const issue=md.ids[i];
  modalCtx='todo';
  document.getElementById('mtitle').textContent='Create action from issue';
  const memberOpts=curMeeting().members.map(p=>'<option value="'+p+'">'+p+'</option>').join('');
  const syncNote=msToken&&msPlanId?'<div style="font-size:11px;color:var(--gr);padding:4px 0;display:flex;align-items:center;gap:5px"><i class="ti ti-brand-microsoft"></i> Will sync to Planner & To Do automatically</div>':'';
  document.getElementById('mfields').innerHTML=
    '<div class="fld"><label>Issue (reference)</label><div style="font-size:12px;color:var(--t2);padding:6px 8px;background:var(--bg2);border-radius:var(--rs);border:1px solid var(--bd)">'+issue.issue+'</div></div>'+
    '<div class="fld"><label>Action / Task</label><input id="f1" placeholder="What needs to be done?"/></div>'+
    '<div class="fld"><label>Assign to</label><select id="f2">'+memberOpts+'</select></div>'+
    '<div class="fld"><label>Due date</label><input id="f3" placeholder="e.g. Jul 14"/></div>'+
    '<div class="fld"><label>Notes (optional)</label><textarea id="f4" placeholder="Add context or details..." style="min-height:64px;resize:vertical"></textarea></div>'+
    syncNote;
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('f1')?.focus(),50);
}

function rConclude(){
  const wk=curWeek(),md=mData();
  if(!md.weekRatings)md.weekRatings={};
  if(!md.weekRatings[wk])md.weekRatings[wk]=[];
  const wkRatings=md.weekRatings[wk];
  const avg=wkRatings.length?Math.round(wkRatings.reduce((a,b)=>a+b.rating,0)/wkRatings.length*10)/10:null;
  const opts=[1,1.5,2,2.5,3,3.5,4];
  const dur=md.meetingDurations&&md.meetingDurations[wk]?fmtDuration(md.meetingDurations[wk]):null;

  // Rating submission form
  const memberOpts=curMeeting().members.map(p=>`<option value="${p}">${p}</option>`).join('');
  const ratingForm=`
    <div style="background:var(--bg2);border-radius:var(--rs);padding:14px;border:1px solid var(--bd);margin-bottom:14px">
      <div style="font-size:12px;font-weight:700;color:var(--t);margin-bottom:10px">Submit your rating</div>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
        <select id="rating-person" style="font-size:12px;padding:5px 8px"><option value="">Select your name...</option>${memberOpts}</select>
      </div>
      <div style="font-size:12px;color:var(--t2);margin-bottom:8px">Your rating (1 = poor · 4 = excellent)</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
        ${opts.map(n=>`<button class="rtbtn" id="rb-${n}" onclick="selectRating(${n})">${n}</button>`).join('')}
      </div>
      <input id="rating-note" placeholder="Why did you give this rating? (optional)" style="width:100%;font-size:12px;padding:6px 10px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--bg);color:var(--t);margin-bottom:10px"/>
      <button class="bsav" onclick="submitRating()" style="font-size:12px;padding:6px 14px">Submit rating</button>
    </div>`;

  // Existing ratings
  const ratList=wkRatings.length?wkRatings.map(r=>`
    <div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:${r.note?'3px':'0'}">
          <span style="font-size:12px;font-weight:700;color:var(--t)">${r.person}</span>
          <span style="font-size:11px;padding:2px 8px;border-radius:4px;font-weight:700;background:${r.rating>=3.5?'var(--gr2)':r.rating>=2.5?'var(--am2)':'var(--re2)'};color:${r.rating>=3.5?'var(--gr)':r.rating>=2.5?'var(--am)':'var(--re)'}">${r.rating}/4</span>
        </div>
        ${r.note?`<div style="font-size:12px;color:var(--t2)">"${r.note}"</div>`:''}
      </div>
      <button class="rbtn" onclick="deleteRating('${r.person}')" title="Remove"><i class="ti ti-x" style="font-size:11px"></i></button>
    </div>`).join(''):`<div style="font-size:13px;color:var(--t2);padding:8px 0">No ratings yet — be the first to submit!</div>`;

  return `<div class="card"><div class="chdr"><div class="chl"><i class="ti ti-star"></i><div><div class="ctitle">${ST.navTabs[6]}</div><div class="csub">${avg?'Team avg: '+avg+'/4':'No ratings yet'}${dur?' · Duration: '+dur:''}</div></div></div><span class="tbadge">5 min</span></div>
    <div style="padding:14px">
      ${ratingForm}
      <div style="font-size:12px;font-weight:700;color:var(--t);margin-bottom:8px">Team ratings this week</div>
      ${ratList}
    </div>
    <div style="padding:0 14px 14px;margin-top:8px">
      <div style="font-size:12px;font-weight:700;color:var(--t);margin-bottom:10px;padding-top:10px;border-top:1px solid var(--bd)">Wrap-up checklist</div>
      ${['All to-dos assigned with owners & due dates','All IDS issues resolved or moved to to-do','Scorecard updated by all owners','Next meeting date confirmed'].map(item=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><input type="checkbox" style="width:15px;height:15px;accent-color:var(--o);cursor:pointer;flex-shrink:0"/><span style="font-size:13px">${item}</span></div>`).join('')}
    </div>
  </div>`;
}

let selectedRating=null;
function selectRating(n){
  selectedRating=n;
  [1,1.5,2,2.5,3,3.5,4].forEach(v=>{
    const btn=document.getElementById('rb-'+v);
    if(btn)btn.className='rtbtn'+(v===n?' sel':'');
  });
}
function submitRating(){
  const person=document.getElementById('rating-person')?.value;
  const note=document.getElementById('rating-note')?.value.trim();
  if(!person){alert('Please select your name');return;}
  if(!selectedRating){alert('Please select a rating');return;}
  const wk=curWeek(),md=mData();
  if(!md.weekRatings)md.weekRatings={};
  if(!md.weekRatings[wk])md.weekRatings[wk]=[];
  md.weekRatings[wk]=md.weekRatings[wk].filter(r=>r.person!==person);
  md.weekRatings[wk].push({person,rating:selectedRating,note:note||''});
  selectedRating=null;
  save();render();
}
function deleteRating(person){
  const wk=curWeek(),md=mData();
  if(md.weekRatings&&md.weekRatings[wk])md.weekRatings[wk]=md.weekRatings[wk].filter(r=>r.person!==person);
  save();render();
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(type){
  modalCtx=type;
  const titles={hl:'Add team member',sc:'Add scorecard metric',rock:'Add quarterly rock',todo:'Add to-do item',ids:'Add issue to IDS'};
  document.getElementById('mtitle').textContent=titles[type]||'Add item';
  let f='';
  if(type==='hl')f=`<div class="fld"><label>Person name</label><input id="f1" placeholder="e.g. Store Manager"/></div>`;
  if(type==='sc')f=`<div class="fld"><label>Metric name</label><input id="f1" placeholder="e.g. Oil changes"/></div><div class="fld"><label>Owner</label><input id="f2" placeholder="e.g. Andy"/></div><div class="fld"><label>Weekly goal</label><input id="f3" type="number" placeholder="e.g. 4"/></div><div class="fld"><label>Frequency note (optional)</label><input id="f4" placeholder="e.g. 2-4/month"/></div>`;
  if(type==='rock')f=`<div class="fld"><label>Rock description</label><input id="f1" placeholder="e.g. Launch training program"/></div><div class="fld"><label>Owner</label><input id="f2" placeholder="e.g. Andy"/></div><div class="fld"><label>Due date</label><input id="f3" placeholder="e.g. Sep 30, 2026"/></div>`;
  if(type==='todo')f=`<div class="fld"><label>Task</label><input id="f1" placeholder="e.g. Update handbook"/></div>${memberSelect('','f2')}<div class="fld"><label>Due date</label><input id="f3" placeholder="e.g. Jul 14"/></div><div class="fld"><label>Notes (optional)</label><textarea id="f4" placeholder="Add context, details, or background..." style="min-height:72px;resize:vertical"></textarea></div>${msToken&&msPlanId?`<div style="font-size:11px;color:var(--gr);padding:4px 0;display:flex;align-items:center;gap:5px"><i class="ti ti-brand-microsoft"></i> Will sync to Planner & To Do automatically</div>`:''}`;
  if(type==='ids')f=`<div class="fld"><label>Issue / Opportunity</label><input id="f1" placeholder="Describe the issue or opportunity"/></div><div class="fld"><label>Raised by</label><input id="f2" placeholder="e.g. Andy"/></div><div class="fld"><label>Priority</label><select id="f3"><option value="high">High</option><option value="med" selected>Medium</option><option value="low">Low</option></select></div><div class="fld"><label>Notes (optional)</label><textarea id="f4" placeholder="Add context, background, or details..." style="min-height:72px;resize:vertical"></textarea></div>`;
  document.getElementById('mfields').innerHTML=f;
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>{const el=document.getElementById('f1');if(el)el.focus();},50);
}
function closeModal(){document.getElementById('modal').classList.remove('open');modalCtx=null;}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
function saveModal(){
  const v=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  const t=modalCtx;
  if(t==='hl'&&v('f1'))D.headlines.push({id:Date.now(),person:v('f1'),text:''});
  else if(t==='sc'&&v('f1')){const k=DEF_SC_KEYS[activeSCTab];D.scorecard[k].push({id:Date.now(),metric:v('f1'),owner:v('f2')||'—',goal:v('f3')||'1',freq:v('f4')||'Weekly',values:{}});}
  else if(t==='rock'&&v('f1')){const r=getRocks();r.push({id:Date.now(),rock:v('f1'),owner:v('f2')||'—',due:v('f3')||'—',status:'on'});}
  else if(t==='todo'&&v('f1')){const md=mData();if(!md.todos)md.todos=[];const todo={id:Date.now(),task:v('f1'),owner:v('f2')||'—',due:v('f3')||curWeek(),notes:v('f4')||'',status:'open',weekCreated:curWeek()};md.todos.push(todo);if(msToken&&msPlanId)createPlannerTask(todo);}
  else if(t==='ids'&&v('f1')){const md=mData();if(!md.ids)md.ids=[];md.ids.push({id:Date.now(),issue:v('f1'),raisedBy:v('f2')||'—',priority:v('f3')||'med',notes:v('f4')||'',status:'open',weekCreated:curWeek()});}
  save();closeModal();render();
}

// ── SETTINGS PANEL ────────────────────────────────────────────────────────────
function openSettings(){
  document.getElementById('s-org').value=ST.orgName;
  document.getElementById('s-mtg').value=ST.meetingName;

function closeSettings(){document.getElementById('soverlay').classList.remove('open');}

function saveSettings(){
  ST.orgName=document.getElementById('s-org').value.trim()||ST.orgName;
  ST.meetingName=document.getElementById('s-mtg').value.trim()||ST.meetingName;
  ST.navTabs=ST.navTabs.map((_,i)=>{const el=document.getElementById('sn'+i);return el&&el.value.trim()?el.value.trim():_;});
  ST.scTabs=ST.scTabs.map((_,i)=>{const el=document.getElementById('ss'+i);return el&&el.value.trim()?el.value.trim():_;});
  ST.agendaItems=ST.agendaItems.map((a,i)=>{const l=document.getElementById('sa'+i),m=document.getElementById('sm'+i);return{label:l&&l.value.trim()?l.value.trim():a.label,minutes:m?parseInt(m.value)||a.minutes:a.minutes};});
  saveSettings2(ST); // save locally
  D.settings=ST;    // include in shared data
  save();           // push to SharePoint
  closeSettings();applySettings();render();
}
function resetSettings(){if(!confirm('Reset all labels to defaults?'))return;ST=defSettings();saveSettings2(ST);D.settings=ST;save();closeSettings();applySettings();render();}

// ── FIX WEEKS ────────────────────────────────────────────────────────────────
function thisMonday(){
  const d=new Date(),day=d.getDay(),m=new Date(d);
  m.setDate(d.getDate()-(day===0?6:day-1));
  m.setHours(0,0,0,0);
  return 'Wk '+m.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function fixWeeks(){
  const curMon=thisMonday();
  const mo={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const yr=new Date().getFullYear();

  function parseWk(w){
    const p=w.replace('Wk ','').split(' ');
    return new Date(yr,mo[p[0]],parseInt(p[1]));
  }
  const curDate=parseWk(curMon);

  if(!D.weeks||!D.weeks.length){D.weeks=[curMon];D.wkIdx=0;save();return;}

  // Remove any future weeks (beyond current Monday)
  D.weeks=D.weeks.filter(w=>{
    try{return parseWk(w)<=curDate;}catch(e){return false;}
  });

  // Ensure current Monday is in the list
  if(!D.weeks.includes(curMon))D.weeks.push(curMon);

  // Remove duplicates and sort chronologically
  D.weeks=[...new Set(D.weeks)];
  D.weeks.sort((a,b)=>parseWk(a)-parseWk(b));

  // Always set wkIdx to current Monday (last item)
  D.wkIdx=D.weeks.length-1;
  save();
}
