<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Journey Auto Level 10 — Config</title>
<script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f5f6f7;}
  .box{background:#fff;border-radius:12px;padding:2rem;text-align:center;max-width:360px;box-shadow:0 4px 16px rgba(0,0,0,0.1);}
  .logo{width:56px;height:56px;border-radius:50%;background:#FE8630;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;}
  h2{font-size:18px;color:#1a1d20;margin-bottom:0.5rem;}
  p{font-size:13px;color:#6b7280;margin-bottom:1.5rem;}
  .btn{background:#FE8630;color:#fff;border:none;padding:10px 24px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">&#128663;</div>
  <h2>Journey Auto Level 10</h2>
  <p>Click Save to add the Level 10 meeting app to this channel.</p>
  <button class="btn" onclick="saveConfig()">Save</button>
</div>
<script>
microsoftTeams.app.initialize().then(()=>{
  microsoftTeams.pages.config.registerOnSaveHandler(saveEvent=>{
    microsoftTeams.pages.config.setConfig({
      entityId:'level10main',
      contentUrl:'https://acdauer.github.io/journey-level10/',
      websiteUrl:'https://acdauer.github.io/journey-level10/',
      suggestedDisplayName:'Level 10 Meeting'
    });
    saveEvent.notifySuccess();
  });
  microsoftTeams.pages.config.setValidityState(true);
});
function saveConfig(){
  microsoftTeams.pages.config.setConfig({
    entityId:'level10main',
    contentUrl:'https://acdauer.github.io/journey-level10/',
    websiteUrl:'https://acdauer.github.io/journey-level10/',
    suggestedDisplayName:'Level 10 Meeting'
  });
}
</script>
</body>
</html>
